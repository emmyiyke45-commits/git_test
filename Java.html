<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="game-ui">
    <button id="rock">Rock</button>
    <button id="paper">Paper</button>
    <button id="scissors">Scissors</button>
</div>

<div id="results">Choose your weapon!</div>


  <script>  
const resultsDiv = document.createElement("div");
resultsDiv.id = "game-results";
resultsDiv.style.marginTop = "20px";
resultsDiv.textContent = "Select an option to start the game!";
document.body.appendChild(resultsDiv);

function getComputerChoice() {
    const choices = ["rock", "paper", "scissors"];
    return choices[Math.floor(Math.random() * choices.length)];
}

function playRound(playerSelection) {
    const computerSelection = getComputerChoice();
    let message = "";

    if (playerSelection === computerSelection) {
        message = `It's a tie! You both chose ${playerSelection}.`;
    } else if (
        (playerSelection === "rock" && computerSelection === "scissors") ||
        (playerSelection === "paper" && computerSelection === "rock") ||
        (playerSelection === "scissors" && computerSelection === "paper")
    ) {
        message = `Victory! ${playerSelection} smashes ${computerSelection}.`;
    } else {
        message = `Defeat! ${computerSelection} overcomes ${playerSelection}.`;
    }

    resultsDiv.textContent = message;
}

document.querySelector("#rock").addEventListener("click", () =>  playRound("rock"));
document.querySelector("#paper").addEventListener("click", () => playRound("paper"));
document.querySelector("#scissors").addEventListener("click", () => playRound("scissors"));

let playerScore = 0;
let computerScore = 0;


const scoreDiv = document.createElement("div");
scoreDiv.id = "score-board";
scoreDiv.textContent = `Player: 0 | Computer: 0`;
document.body.appendChild(scoreDiv);


const resultsDiv = document.createElement("div");
resultsDiv.id = "round-results";
document.body.appendChild(resultsDiv);


const winnerDiv = document.createElement("div");
winnerDiv.id = "winner-announcement";
winnerDiv.style.fontWeight = "bold";
winnerDiv.style.color = "red";
document.body.appendChild(winnerDiv);

function checkWinner() {
    if (playerScore === 5) {
        winnerDiv.textContent = "CONGRATULATIONS! You reached 5 points and won the game!";
        disableButtons();
    } else if (computerScore === 5) {
        winnerDiv.textContent = "GAME OVER! The Computer reached 5 points first.";
        disableButtons();
    }
}

function disableButtons() {
    document.querySelectorAll("button").forEach(btn => btn.disabled = true);












  </script>





</body>
</html>
